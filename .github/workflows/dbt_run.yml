name: dbt run

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9am UTC
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  dbt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install dbt-sqlserver==1.9.0 dbt-fabric==1.9.3

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          edgar_analytics:
            outputs:
              dev:
                type: sqlserver
                driver: 'ODBC Driver 18 for SQL Server'
                host: sql-edgar-analytics.database.windows.net
                port: 1433
                database: edgar-analytics
                schema: dbo
                user: edgaradmin
                password: "${{ secrets.DBT_SQL_PASSWORD }}"
                threads: 4
            target: dev
          EOF

      - name: Run dbt
        working-directory: dbt/edgar_analytics
        run: dbt run